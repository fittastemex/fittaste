async function sbGet(t,params=""){try{const r=await fetch(`${SB}/${t}?select=*${params?"&"+params:""}`,{headers:H});const d=await r.json();return Array.isArray(d)?d:[];}catch(e){console.error(t,e);return[];}}
async function sbPost(t,data){try{const r=await fetch(`${SB}/${t}`,{method:"POST",headers:{...H,Prefer:"return=representation"},body:JSON.stringify(data)});return await r.json();}catch(e){console.error(t,e);return null;}}
async function sbPatch(t,id,data){try{const r=await fetch(`${SB}/${t}?id=eq.${id}`,{method:"PATCH",headers:{...H,Prefer:"return=representation"},body:JSON.stringify(data)});return await r.json();}catch(e){console.error(t,e);return null;}}
async function sbDelete(t,id){try{const r=await fetch(`${SB}/${t}?id=eq.${id}`,{method:"DELETE",headers:H});return r.ok;}catch(e){console.error(t,e);return false;}}
async function sbDeleteWhere(t,filter){try{const r=await fetch(`${SB}/${t}?${filter}`,{method:"DELETE",headers:H});return r.ok;}catch(e){console.error(t,e);return false;}}
function genToken(){return Array.from(crypto.getRandomValues(new Uint8Array(24))).map(b=>b.toString(36)).join("").slice(0,32);}
function genSerial(pedidos){const hoy=new Date();const ymd=hoy.toISOString().split("T")[0].replace(/-/g,"");const delDia=pedidos.filter(p=>{const f=(p.created_at||p.fecha||"").split("T")[0];return f===hoy.toISOString().split("T")[0];}).length;const num=String(delDia+1).padStart(3,"0");return`PED-${ymd}-${num}`;}

// Cambia estas contraseñas cuando quieras
const PASSWORDS={
  admin:"fittaste2026",
  compras:"compras2026",
  sucursal:"roma2026",
  proveedor:"prov2026",
  almacen:"almacen2026",

// ======================== LOGIN ========================
function LoginScreen({onLogin,provToken}){
  if(provToken)return null;
  const [selected,setSelected]=useState(null);
  const [pass,setPass]=useState("");
  const [error,setError]=useState("");
  const roles=[{rol:"admin",label:"Admin / Dueño",desc:"Acceso total",icon:"★",color:"#e2a52a"},{rol:"compras",label:"Compras",desc:"Gestiona pedidos",icon:"◈",color:"#e2a52a"},{rol:"sucursal",label:"Sucursal",desc:"Crea pedidos",icon:"◉",color:"#bfcd3b"},{rol:"proveedor",label:"Proveedor",desc:"Captura precios",icon:"◇",color:"#d6816c"},{rol:"almacen",label:"Almacén",desc:"Inventario",icon:"◫",color:"#77b7b4"},{rol:"finanzas",label:"Finanzas",desc:"Cuentas por pagar",icon:"◎",color:"#d6816c"}];

  const handleLogin=()=>{
    if(PASSWORDS[selected]===pass){setError("");onLogin(selected);}
    else{setError("Contraseña incorrecta");setPass("");}
  };

  return(<div className="min-h-screen flex items-center justify-center p-4" style={{background:"linear-gradient(135deg,#2D2D2D,#1a1a1a)"}}>
    <div className="max-w-sm w-full">
      <div className="text-center mb-8">
        <div className="flex justify-center mb-4"><Logo size={56}/></div>
        <p className="text-sm tracking-widest font-medium" style={{color:"#e2a52a"}}>SER FIT NUNCA SUPO TAN RICO</p>
        <p className="text-gray-500 text-xs mt-3">Sistema de compras e inventario v{V}</p>
      </div>

      {!selected?<div>
        <p className="text-gray-400 text-sm text-center mb-3">Selecciona tu rol</p>
        <div className="space-y-2">{roles.map(r=>(
          <button key={r.rol} onClick={()=>{setSelected(r.rol);setPass("");setError("");}} className="w-full flex items-center gap-3 p-3 rounded-xl border border-gray-700 bg-gray-800/50 hover:bg-gray-800 transition-all text-left group" style={{borderLeftWidth:3,borderLeftColor:r.color}}>
            <span className="w-10 h-10 rounded-lg flex items-center justify-center font-bold" style={{background:r.color+"22",color:r.color}}>{r.icon}</span>
            <div><p className="font-semibold text-white text-sm">{r.label}</p><p className="text-xs text-gray-500">{r.desc}</p></div>
          </button>
        ))}</div>
      </div>

      :<div>
        <button onClick={()=>{setSelected(null);setError("");}} className="text-gray-500 text-sm hover:text-gray-300 mb-4">← Cambiar rol</button>
        <div className="bg-gray-800/50 border border-gray-700 rounded-xl p-4" style={{borderTopWidth:3,borderTopColor:roles.find(r=>r.rol===selected)?.color}}>
          <div className="flex items-center gap-3 mb-4">
            <span className="w-10 h-10 rounded-lg flex items-center justify-center font-bold" style={{background:(roles.find(r=>r.rol===selected)?.color||"#e2a52a")+"22",color:roles.find(r=>r.rol===selected)?.color}}>{roles.find(r=>r.rol===selected)?.icon}</span>
            <div><p className="font-semibold text-white">{roles.find(r=>r.rol===selected)?.label}</p><p className="text-xs text-gray-500">{roles.find(r=>r.rol===selected)?.desc}</p></div>
          </div>
          <div className="mb-3">
            <label className="text-xs text-gray-400 block mb-1">Contraseña</label>
            <input type="password" className="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500" placeholder="Ingresa tu contraseña" value={pass} onChange={e=>{setPass(e.target.value);setError("");}} onKeyDown={e=>{if(e.key==="Enter"&&pass)handleLogin();}} autoFocus/>
          </div>
          {error&&<p className="text-red-400 text-xs mb-3">{error}</p>}
          <Btn onClick={handleLogin} disabled={!pass}>Ingresar</Btn>
        </div>
      </div>}
    </div>
  </div>);
}

// ======================== BANDEJA DE PEDIDOS ========================
function BandejaPedidos({pedidos,rol,onSelect,onNew,pedidoDetalle,proveedores,provEstatus,onDelete,recepciones}){
  let filteredByRol=pedidos;
  if(rol==="sucursal")filteredByRol=pedidos;
  else if(rol==="proveedor"){
    const jcProv=proveedores?.find(p=>p.nombre==="Juan Carlos Botello");
    filteredByRol=pedidos.filter(p=>{
      const pe=provEstatus?.find(x=>x.pedido_id===p.id&&x.proveedor_id===jcProv?.id);
      return pe&&["enviado","precios_capturados"].includes(pe.estatus);
    });
  }
  // Count pending recepciones per pedido (for sucursal)
  const pendRecep=(pedId)=>{
    const pes=provEstatus.filter(pe=>pe.pedido_id===pedId&&["precios_capturados","completo","surtido"].includes(pe.estatus));
    return pes.filter(pe=>!(recepciones||[]).some(r=>r.pedido_id===pedId&&r.proveedor_id===pe.proveedor_id)).length;
  };
  return(<div>
    <div className="flex items-center justify-between mb-4">
      <div><h2 className="text-lg font-bold text-gray-900">Pedidos</h2><p className="text-sm text-gray-500">{filteredByRol.length} pedido{filteredByRol.length!==1?"s":""}</p></div>
      {(rol==="sucursal"||rol==="admin")&&<Btn onClick={onNew}>+ Nuevo pedido</Btn>}
    </div>
    {filteredByRol.length===0?<div className="bg-white border border-gray-200 rounded-xl p-8 text-center"><p className="text-gray-400">No hay pedidos</p>{(rol==="sucursal"||rol==="admin")&&<Btn onClick={onNew}>Crear primer pedido</Btn>}</div>
    :<div className="space-y-2">{filteredByRol.map(p=>{const bc={creado:"#e2a52a",en_proceso:"#77b7b4",comprado:"#bfcd3b",cerrado:"#9ca3af"}[p.estatus]||"#e5e7eb";return(<div key={p.id} className="w-full bg-white border border-gray-200 rounded-xl p-4 hover:border-amber-400 transition-all text-left" style={{borderLeft:`4px solid ${bc}`}}>
      <div className="flex items-center justify-between mb-2">
        <button onClick={()=>onSelect(p)} className="flex items-center gap-2 flex-1 text-left"><span className="font-bold text-gray-900">Pedido {p.numero_pedido||"#—"}</span>{estatusBadge(p.estatus)}</button>
        <div className="flex items-center gap-2">
          <span className="text-xs text-gray-400">{new Date(p.created_at||p.fecha).toLocaleDateString("es-MX")}</span>
          {["admin","compras"].includes(rol)&&p.estatus!=="cerrado"&&<button onClick={(e)=>{e.stopPropagation();onDelete(p.id);}} className="text-xs text-red-400 hover:text-red-600 hover:bg-red-50 px-2 py-1 rounded" title="Eliminar pedido">✕</button>}
        </div>
      </div>
      <button onClick={()=>onSelect(p)} className="w-full text-left"><div className="flex items-center gap-4 text-sm">
        <span className="text-gray-500">{p.sucursal||"Roma"}</span>
        <span className="text-gray-500">{p.num_articulos||0} artículos</span>
        <span className="font-semibold text-gray-700">{fmt(p.total_teorico)}</span>
        {p.articulos_sin_precio>0&&<span className="text-amber-600 text-xs">{p.articulos_sin_precio} sin precio</span>}
        {rol==="sucursal"&&pendRecep(p.id)>0&&<Badge v="warning">Pendiente de recepción ({pendRecep(p.id)})</Badge>}
      </div></button>
    </div>)})}</div>}
  </div>);
}

// ======================== CREAR PEDIDO (SUCURSAL) ========================
function CrearPedido({catalogo,proveedores,onSave,onCancel}){
  const [pedido,setPedido]=useState({});
  const [filter,setFilter]=useState("");
  const [saving,setSaving]=useState(false);
  const filtered=catalogo.filter(p=>p.articulo.toLowerCase().includes(filter.toLowerCase())||p.tipo_producto.toLowerCase().includes(filter.toLowerCase()));
  const totalTeo=catalogo.reduce((s,p)=>s+(pedido[p.id]||0)*p.costo_referencia,0);
  const count=Object.values(pedido).filter(v=>v>0).length;
  const tb={PROTEINAS:"danger",SUPLEMENTO:"purple",EMPAQUE:"info",FRUTA:"warning",LIMPIEZA:"default"};

  const handleSave=async()=>{
    const items=catalogo.filter(p=>(pedido[p.id]||0)>0).map(p=>({catalogo_id:p.id,proveedor_id:p.proveedor_id,cantidad:pedido[p.id],costo_referencia:p.costo_referencia}));
    if(items.length===0||saving)return;
    setSaving(true);
    await onSave(items,totalTeo);
    setPedido({});
    setSaving(false);
  };

  return(<div>
    <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
      <div><h2 className="text-lg font-bold text-gray-900">Nuevo pedido</h2><p className="text-sm text-gray-500">Selecciona artículos y cantidades</p></div>
      <div className="flex items-center gap-2">
        <div className="text-right bg-amber-50 border border-amber-200 rounded-xl px-4 py-2"><p className="text-xl font-bold text-amber-700">{fmt(totalTeo)}</p><p className="text-xs text-amber-600">{count} artículos</p></div>
      </div>
    </div>
    <div className="flex gap-2 mb-4">
      <input className="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-amber-400" placeholder="Buscar..." value={filter} onChange={e=>setFilter(e.target.value)}/>
      <button onClick={onCancel} className="px-4 py-2 text-sm text-gray-500 hover:text-gray-700 border border-gray-200 rounded-xl">Cancelar</button>
      <Btn onClick={handleSave} disabled={count===0||saving}>{saving?"Creando...":"Enviar pedido ("+count+")"}</Btn>
    </div>
    <div className="overflow-x-auto rounded-xl border border-gray-200 bg-white"><table className="w-full text-sm"><thead className="bg-gray-50"><tr>
      {["Tipo","Artículo","Proveedor","Cantidad","Unidad","Subtotal"].map(h=><th key={h} className={`px-3 py-2.5 font-semibold text-gray-600 text-xs uppercase ${h==="Cantidad"?"text-center":h==="Subtotal"?"text-right":"text-left"}`}>{h}</th>)}
    </tr></thead><tbody>{filtered.map(p=>{const qq=pedido[p.id]||0;return(<tr key={p.id} className={`border-t border-gray-100 ${qq>0?"bg-amber-50/60":"hover:bg-gray-50"}`}>
      <td className="px-3 py-2"><Badge v={tb[p.tipo_producto]||"success"}>{p.tipo_producto}</Badge></td>
      <td className="px-3 py-2 font-medium text-gray-900">{p.articulo}</td>
      <td className="px-3 py-2 text-gray-400 text-xs">{p.proveedor_nombre}</td>
      <td className="px-3 py-2 text-center"><input type="number" min="0" step={p.unidad_clave==="kg"?"0.25":"1"} className="w-20 text-center border border-gray-200 rounded-lg px-1 py-1 text-sm focus:ring-2 focus:ring-amber-400" value={pedido[p.id]||""} onChange={e=>setPedido({...pedido,[p.id]:parseFloat(e.target.value)||0})}/></td>
      <td className="px-3 py-2 text-gray-500">{p.unidad_clave}</td>
      <td className="px-3 py-2 text-right font-semibold text-gray-700">{qq>0?fmt(qq*p.costo_referencia):"-"}</td>
    </tr>);})}</tbody></table></div>
  </div>);
}

// ======================== DETALLE PEDIDO (COMPRAS) ========================
function DetallePedido({pedido:ped,detalle,catalogo,proveedores,provEstatus,onBack,onAction,onReasignar,onUpdatePrecio,onUpdateCantidad,onAddItem,rol,recepciones}){
  const [addingTo,setAddingTo]=useState(null);
  const [addProduct,setAddProduct]=useState("");
  const [addQty,setAddQty]=useState(0);

  const byProv={};
  detalle.forEach(d=>{
    const prov=proveedores.find(p=>p.id===d.proveedor_id);
    const k=prov?.nombre||"?";
    if(!byProv[k])byProv[k]={items:[],prov,estatus:provEstatus.find(pe=>pe.proveedor_id===d.proveedor_id)};
    byProv[k].items.push(d);
  });

  const isAlmacenInterno=(provId)=>{const prov=proveedores.find(p=>p.id===provId);return prov?.tipo_flujo==="Almacen interno";};
  const allHavePrice=detalle.every(d=>d.cantidad===0||d.costo_real!=null||isAlmacenInterno(d.proveedor_id));
  const allProvComplete=provEstatus.every(pe=>["completo","precios_capturados","surtido","recibido_completo","recibido_con_faltantes"].includes(pe.estatus));
  const canComprar=allHavePrice&&allProvComplete;
  const totalTeo=detalle.reduce((s,d)=>s+d.cantidad*d.costo_referencia,0);
  const totalReal=detalle.reduce((s,d)=>s+d.cantidad*(d.costo_real||d.costo_referencia),0);

  const closeBlockers=[];
  if(!allHavePrice){const n=detalle.filter(d=>d.cantidad>0&&d.costo_real==null&&!isAlmacenInterno(d.proveedor_id)).length;if(n>0)closeBlockers.push(`${n} artículo${n>1?"s":""} sin precio real`);}
  provEstatus.forEach(pe=>{const prov=proveedores.find(p=>p.id===pe.proveedor_id);if(pe.estatus==="pendiente")closeBlockers.push(`${prov?.nombre||"?"}: no enviado`);if(pe.estatus==="enviado")closeBlockers.push(`${prov?.nombre||"?"}: esperando confirmación`);});
  const isCompras=["admin","compras"].includes(rol);

  const handleAdd=(provId)=>{
    if(!addProduct||addQty<=0)return;
    const cat=catalogo.find(c=>c.id===addProduct);
    if(!cat)return;
    onAddItem(ped.id,cat.id,provId,addQty,cat.costo_referencia);
    setAddProduct("");setAddQty(0);setAddingTo(null);
  };

  // Products available to add (not already in this pedido for this provider)
  const getAvailable=(provId)=>{
    const existing=detalle.filter(d=>d.proveedor_id===provId).map(d=>d.catalogo_id);
    return catalogo.filter(c=>!existing.includes(c.id));
  };

  return(<div>
    <button onClick={onBack} className="text-sm text-gray-500 hover:text-gray-700 mb-4">← Volver a bandeja</button>
    <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
      <div className="flex items-center gap-3"><h2 className="text-lg font-bold text-gray-900">Pedido #{ped.numero_pedido}</h2>{estatusBadge(ped.estatus)}</div>
      <div className="flex gap-3">
        <div className="bg-white border border-gray-200 rounded-xl px-3 py-2 text-center"><p className="text-xs text-gray-500">Teórico</p><p className="font-bold text-gray-800">{fmt(totalTeo)}</p></div>
        <div className="bg-white border border-gray-200 rounded-xl px-3 py-2 text-center"><p className="text-xs text-gray-500">Real</p><p className={`font-bold ${totalReal>totalTeo*1.05?"text-red-600":"text-emerald-600"}`}>{fmt(totalReal)}</p></div>
      </div>
    </div>

    {Object.entries(byProv).map(([nombre,{items,prov,estatus:pEst}])=>{
      const flujo=prov?.tipo_flujo||"";const quien=prov?.quien_captura||"";
      const pT=items.reduce((s,d)=>s+d.cantidad*(d.costo_real||d.costo_referencia),0);
      const est=pEst?.estatus||"pendiente";
      const allProvPrice=items.every(d=>d.costo_real!=null);
      const token=pEst?.token_acceso;
      const linkProv=token?`${window.location.origin}${window.location.pathname}?token=${token}`:null;
      const available=getAvailable(prov?.id);

      return(<div key={nombre} className="bg-white border border-gray-200 rounded-xl mb-4 overflow-hidden">
        <div className="flex items-center justify-between px-4 py-3 bg-gray-50 border-b border-gray-100">
          <div className="flex items-center gap-2"><h3 className="font-bold text-gray-800">{nombre}</h3><Badge v={flujo==="Commodity"?"commodity":flujo==="Compra manual"?"manual":"almacen"}>{flujo}</Badge><Badge v={est==="completo"||est==="precios_capturados"||est==="surtido"?"success":est==="enviado"?"warning":"default"}>{est}</Badge></div>
          <div className="flex items-center gap-2">
            <span className="font-bold text-gray-700">{fmt(pT)}</span>
            {flujo==="Commodity"&&est==="pendiente"&&isCompras&&<Btn onClick={()=>onAction("enviar_proveedor",prov.id)}>Enviar a {nombre.split(" ")[0]}</Btn>}
            {flujo==="Commodity"&&est==="enviado"&&linkProv&&<button onClick={()=>{navigator.clipboard.writeText(linkProv);alert("Link copiado:\n"+linkProv);}} className="text-xs bg-amber-100 text-amber-800 px-3 py-1.5 rounded-lg hover:bg-amber-200">Copiar link</button>}
            {flujo==="Compra manual"&&est!=="completo"&&allProvPrice&&isCompras&&<Btn onClick={()=>onAction("cerrar_manual",prov.id)} color="green">Cerrar compra</Btn>}
            {flujo==="Almacen interno"&&est==="pendiente"&&isCompras&&<Btn onClick={()=>onAction("enviar_almacen",prov.id)} color="purple">Enviar a almacén</Btn>}
          </div>
        </div>
        {flujo==="Commodity"&&est==="enviado"&&linkProv&&<div className="px-4 py-2 bg-amber-50 border-b border-amber-100 text-xs text-amber-800">Link: <span className="font-mono text-amber-900 select-all">{linkProv}</span></div>}
        <table className="w-full text-sm"><thead><tr className="border-b border-gray-100">
          {["Artículo","Cant",isCompras?"Proveedor":"","Ref","Real","Desv.","Total"].filter(Boolean).map(h=><th key={h} className={`px-3 py-2 font-medium text-gray-500 text-xs ${h==="Cant"?"text-center":h==="Proveedor"?"text-left":h!=="Artículo"?"text-right":"text-left"}`}>{h}</th>)}
        </tr></thead><tbody>{items.map(d=>{
          const cat=catalogo.find(c=>c.id===d.catalogo_id)||{};
          const diff=d.costo_real?((d.costo_real-d.costo_referencia)/d.costo_referencia*100):null;
          return(<tr key={d.id} className="border-t border-gray-50">
            <td className="px-3 py-2 font-medium text-gray-800">{cat.articulo||"?"} <span className="text-gray-400 text-xs">{cat.unidad_clave}</span></td>
            <td className="px-3 py-2 text-center">{isCompras?<input type="number" min="0" step={cat.unidad_clave==="kg"?"0.25":"1"} className="w-20 text-center border border-gray-200 rounded px-1 py-0.5 text-sm focus:ring-2 focus:ring-amber-400" value={d.cantidad} onChange={e=>onUpdateCantidad(d.id,parseFloat(e.target.value)||0)}/>:<span className="text-gray-600">{cat.unidad_clave==="kg"?fmtQ(d.cantidad,"kg"):d.cantidad}</span>}</td>
            {isCompras&&<td className="px-3 py-2"><select className="text-xs border border-gray-200 rounded px-1 py-0.5" value={d.proveedor_id} onChange={e=>onReasignar(d.id,e.target.value)}>{proveedores.map(pr=><option key={pr.id} value={pr.id}>{pr.nombre}</option>)}</select></td>}
            <td className="px-3 py-2 text-right text-gray-400">{fmt(d.costo_referencia)}</td>
            <td className="px-3 py-2 text-right">{quien==="compras"&&isCompras?<input type="number" step="0.01" className="w-20 text-right border border-gray-200 rounded px-1 py-0.5 text-sm focus:ring-2 focus:ring-amber-400" value={d.costo_real||""} onChange={e=>onUpdatePrecio(d.id,parseFloat(e.target.value)||null)}/>:d.costo_real?<span className="font-semibold">{fmt(d.costo_real)}</span>:flujo==="Almacen interno"?<span className="text-teal-600">{fmt(d.costo_referencia)}</span>:<span className="text-amber-500 text-xs">Pendiente</span>}</td>
            <td className="px-3 py-2 text-right">{diff!=null?<Badge v={Math.abs(diff)>15?"danger":Math.abs(diff)>5?"warning":"success"}>{diff>0?"+":""}{diff.toFixed(0)}%</Badge>:flujo==="Almacen interno"?<Badge v="purple">Fijo</Badge>:"-"}</td>
            <td className="px-3 py-2 text-right font-semibold text-gray-700">{fmt(d.cantidad*(d.costo_real||d.costo_referencia))}</td>
          </tr>);})}</tbody></table>

        {isCompras&&ped.estatus!=="cerrado"&&<div className="border-t border-gray-100 px-4 py-2">
          {addingTo===prov?.id?<div className="flex gap-2 items-end flex-wrap py-1">
            <div className="flex-1"><label className="text-xs text-gray-500">Producto</label><select className="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm" value={addProduct} onChange={e=>setAddProduct(e.target.value)}><option value="">Seleccionar...</option>{available.map(c=><option key={c.id} value={c.id}>{c.articulo} ({c.unidad_clave}) — {fmt(c.costo_referencia)}</option>)}</select></div>
            <div><label className="text-xs text-gray-500">Cantidad</label><input type="number" min="0" step="0.25" className="w-20 border border-gray-200 rounded-lg px-2 py-1.5 text-sm" value={addQty||""} onChange={e=>setAddQty(parseFloat(e.target.value)||0)}/></div>
            <Btn onClick={()=>handleAdd(prov?.id)} disabled={!addProduct||addQty<=0}>Agregar</Btn>
            <button onClick={()=>setAddingTo(null)} className="text-xs text-gray-500 hover:text-gray-700 px-2 py-1.5">Cancelar</button>
          </div>
          :<button onClick={()=>{setAddingTo(prov?.id);setAddProduct("");setAddQty(0);}} className="text-xs text-amber-700 hover:text-amber-900 font-medium hover:bg-amber-50 px-2 py-1 rounded">+ Agregar artículo a {nombre.split(" ")[0]}</button>}
        </div>}
      </div>);
    })}

    {ped.estatus!=="cerrado"&&ped.estatus!=="comprado"&&isCompras&&<div className="mt-4">
      {closeBlockers.length>0&&<div className="bg-red-50 border border-red-200 rounded-xl p-3 mb-3"><p className="text-sm font-semibold text-red-800 mb-1">No se puede marcar como comprado:</p><ul className="text-xs text-red-700 space-y-0.5">{closeBlockers.map((b,i)=><li key={i}>• {b}</li>)}</ul></div>}
      <div className="flex justify-end"><Btn onClick={()=>{if(!canComprar){alert("No se puede marcar como comprado:\n\n"+closeBlockers.join("\n"));return;}onAction("comprado");}} color={canComprar?"green":"amber"}>{canComprar?"Pedido comprado ✓":"Intentar marcar comprado"}</Btn></div>
    </div>}
    {ped.estatus==="comprado"&&isCompras&&<div className="mt-4"><div className="bg-emerald-50 border border-emerald-200 rounded-xl p-3"><p className="text-sm font-medium text-emerald-800">✓ Pedido comprado — pendiente de recepción por Sucursal</p><p className="text-xs text-emerald-600 mt-1">El pedido se cerrará automáticamente cuando Sucursal confirme la recepción de todos los proveedores</p></div></div>}
    {ped.estatus==="cerrado"&&isCompras&&<div className="mt-4"><div className="bg-gray-100 border border-gray-200 rounded-xl p-3"><p className="text-sm font-medium text-gray-700">✓ Pedido cerrado — CxP generadas para Finanzas</p></div></div>}
  </div>);
}

// ======================== VISTA PROVEEDOR (por token) ========================
function ProveedorTokenView({detalle,catalogo,pedido:ped,provNombre,onConfirm,readOnly}){
  const [precios,setPrecios]=useState(()=>{const p={};detalle.forEach(d=>{if(d.costo_real!=null)p[d.id]=d.costo_real;});return p;});
  const [cantidades,setCantidades]=useState(()=>{const c={};detalle.forEach(d=>{c[d.id]=d.cantidad;});return c;});
  const items=detalle;
  const total=items.reduce((s,d)=>s+(precios[d.id]||0)*(cantidades[d.id]||0),0);
  const totalConIva=items.reduce((s,d)=>{const cat=catalogo.find(c=>c.id===d.catalogo_id)||{};const sub=(precios[d.id]||0)*(cantidades[d.id]||0);return s+sub;},0);
  const iva=items.reduce((s,d)=>{const cat=catalogo.find(c=>c.id===d.catalogo_id)||{};const sub=(precios[d.id]||0)*(cantidades[d.id]||0);return s+(cat.aplica_iva?sub*0.16:0);},0);
  const allCaptured=items.every(d=>precios[d.id]!=null&&precios[d.id]>=0);
  const itemsConCambio=items.filter(d=>(cantidades[d.id]||0)!==d.cantidad);

  return(<div className="min-h-screen" style={{background:"#FAFAF8"}}><div style={{background:"#2D2D2D"}} className="border-b border-gray-200"><div className="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3"><Logo size={32}/><div><h1 className="text-sm font-bold text-white">Fit Taste — Pedido #{ped.numero_pedido}</h1><p className="text-xs text-gray-400">{provNombre}</p></div></div></div>
    <div className="max-w-3xl mx-auto px-4 py-6">
      <div className="rounded-xl p-4 mb-4 border-2 border-amber-300" style={{background:"linear-gradient(135deg,#FEF9EC,#FBF0D1)"}}>
        <h2 className="text-lg font-bold text-gray-900 mb-1">{readOnly?"Resumen de precios y cantidades (solo lectura)":"Captura tus precios y confirma cantidades"}</h2>
        <p className="text-sm text-gray-600">Pedido #{ped.numero_pedido} — {new Date(ped.fecha).toLocaleDateString("es-MX")}</p>
        <p className="text-xs text-gray-500 mt-1">Si no tienes un artículo, pon 0 en la cantidad entregada</p>
        <div className="w-full bg-amber-200 rounded-full h-2 mt-3"><div className="bg-amber-500 h-2 rounded-full transition-all" style={{width:`${items.length>0?(items.filter(d=>precios[d.id]!=null&&precios[d.id]>=0).length/items.length*100):0}%`}}/></div>
        <p className="text-xs text-amber-700 mt-1">{items.filter(d=>precios[d.id]!=null&&precios[d.id]>=0).length} de {items.length} capturados</p>
      </div>
      <div className="grid grid-cols-3 gap-3 mb-4">{[{l:"Subtotal",v:fmt(total)},{l:"IVA 16%",v:fmt(iva)},{l:"Gran Total",v:fmt(total+iva),c:"text-amber-700 font-extrabold"}].map((s,i)=>(<div key={i} className="bg-white border border-gray-200 rounded-xl p-3"><p className="text-xs text-gray-500">{s.l}</p><p className={`text-lg font-bold ${s.c||"text-gray-800"}`}>{s.v}</p></div>))}</div>
      <div className="bg-white border border-gray-200 rounded-xl overflow-hidden"><table className="w-full text-sm"><thead className="bg-gray-50"><tr>
        {["Artículo","Solicitado","Entregado","Unidad","Precio unit.","IVA","Total"].map(h=><th key={h} className={`px-3 py-2.5 font-semibold text-gray-600 text-xs uppercase ${["Solicitado","Entregado","Precio unit."].includes(h)?"text-center":h==="Total"?"text-right":"text-left"}`}>{h}</th>)}
      </tr></thead><tbody>{items.map(d=>{const cat=catalogo.find(c=>c.id===d.catalogo_id)||{};const pr=precios[d.id];const cant=cantidades[d.id]||0;const changed=cant!==d.cantidad;const sub=pr!=null&&cant>0?cant*pr:0;return(<tr key={d.id} className={`border-t border-gray-100 ${cant===0?"bg-red-50/40":pr!=null&&pr>=0?"bg-amber-50/40":""}`}>
        <td className="px-3 py-2 font-medium text-gray-900">{cat.articulo}</td>
        <td className="px-3 py-2 text-center text-gray-400">{cat.unidad_clave==="kg"?fmtQ(d.cantidad,"kg"):d.cantidad}</td>
        <td className="px-3 py-2 text-center">{readOnly?<span className="text-gray-600">{cat.unidad_clave==="kg"?fmtQ(cantidades[d.id]||d.cantidad,"kg"):(cantidades[d.id]||d.cantidad)}</span>:<input type="number" min="0" step={cat.unidad_clave==="kg"?"0.25":"1"} className={`w-20 text-center border rounded-lg px-1 py-1 text-sm focus:ring-2 focus:ring-amber-400 ${changed?"border-orange-400 bg-orange-50":"border-gray-200"}`} value={cantidades[d.id]||""} onChange={e=>setCantidades({...cantidades,[d.id]:parseFloat(e.target.value)||0})}/>}</td>
        <td className="px-3 py-2 text-gray-500">{cat.unidad_clave==="kg"?"por kg":`por ${cat.unidad_clave}`}</td>
        <td className="px-3 py-2 text-center">{readOnly?<span className="font-semibold">{d.costo_real!=null?fmt(d.costo_real):"-"}</span>:<div className="flex items-center justify-center gap-1"><span className="text-gray-400">$</span><input type="number" min="0" step="0.01" className="w-24 text-center border border-gray-200 rounded-lg px-1 py-1 text-sm focus:ring-2 focus:ring-amber-400" value={precios[d.id]!=null?precios[d.id]:""} onChange={e=>setPrecios({...precios,[d.id]:e.target.value===""?null:parseFloat(e.target.value)||0})}/></div>}</td>
        <td className="px-3 py-2 text-center">{cat.aplica_iva?<span className="text-xs text-gray-500">16%</span>:<span className="text-xs text-emerald-600 font-medium">Exento</span>}</td>
        <td className="px-3 py-2 text-right font-semibold text-gray-700">{pr!=null&&cant>0?fmt(sub+(cat.aplica_iva?sub*0.16:0)):cant===0?<span className="text-red-500 text-xs">Sin stock</span>:"-"}</td>
      </tr>);})}</tbody></table></div>
      {itemsConCambio.length>0&&<div className="bg-orange-50 border border-orange-200 rounded-xl p-3 mt-4"><p className="text-sm font-semibold text-orange-800">{itemsConCambio.length} artículo{itemsConCambio.length>1?"s":""} con cantidad diferente a la solicitada</p><div className="text-xs text-orange-700 mt-1">{itemsConCambio.map(d=>{const cat=catalogo.find(c=>c.id===d.catalogo_id)||{};return<p key={d.id}>{cat.articulo}: solicitado {d.cantidad} → entrega {cantidades[d.id]||0}{(cantidades[d.id]||0)===0?" (sin stock)":""}</p>;})}</div></div>}
      {!readOnly&&<div className="flex justify-end mt-4"><Btn onClick={()=>onConfirm(precios,cantidades)} disabled={!allCaptured}>{allCaptured?"Confirmar precios y cantidades":`Faltan ${items.length-items.filter(d=>precios[d.id]!=null&&precios[d.id]>=0).length} precios`}</Btn></div>}
      {readOnly&&<div className="mt-4 text-center"><div className="bg-emerald-50 border border-emerald-200 rounded-xl p-3"><p className="text-sm font-medium text-emerald-800">Precios ya confirmados — vista de solo lectura</p></div></div>}
    </div>
  </div>);
}

// ======================== ALMACÉN PEPS ========================
function AlmacenView({inventario,setInventario,movimientos,setMovimientos,pedidosAlm,catalogo,pedidoDetalle,proveedores,onSurtirPedido,lotes,setLotes,rol,allPedidos,allProvEstatus}){
  const [tab,setTab]=useState("inventario");
  const [surtiendo,setSurtiendo]=useState(null);
  const [surtidos,setSurtidos]=useState({});
  const [cantSurtida,setCantSurtida]=useState({});
  // Entrada de lote
  const [nLote,setNLote]=useState({inv_id:"",cantidad:0,costo_unitario:0,iva:0,proveedor:"",nota:""});
  const [savingLote,setSavingLote]=useState(false);
  // Admin: agregar/borrar productos almacén (#6 #7)
  const [addingInv,setAddingInv]=useState(false);
  const [newInv,setNewInv]=useState({sku:"",descripcion:"",unidad_clave:"kg"});
  const [savingInv,setSavingInv]=useState(false);
  const isAdmin=rol==="admin";

  // Auto-serial MP-XXX
  const genInvSku=()=>{
    const existing=inventario.filter(i=>i.sku.startsWith("MP")).map(i=>parseInt(i.sku.replace("MP",""))||0);
    const next=existing.length>0?Math.max(...existing)+1:1;
    return`MP${String(next).padStart(3,"0")}`;
  };

  const cap=inventario.reduce((s,p)=>s+p.existencia*p.costo_unitario_actual,0);
  const pedidoItems=surtiendo?pedidoDetalle.filter(d=>d.pedido_id===surtiendo&&proveedores.find(pr=>pr.id===d.proveedor_id)?.tipo_flujo==="Almacen interno"):[];
  const totalSurtidos=pedidoItems.filter(d=>surtidos[d.id]).length;
  const allSurtidos=pedidoItems.length>0&&totalSurtidos===pedidoItems.length;

  // Save new lote to Supabase
  const handleNewLote=async()=>{
    if(!nLote.inv_id||nLote.cantidad<=0||nLote.costo_unitario<=0)return;
    setSavingLote(true);
    const data={inventario_id:nLote.inv_id,fecha_entrada:new Date().toISOString().split("T")[0],cantidad:nLote.cantidad,costo_unitario:nLote.costo_unitario,iva:nLote.iva||0,sobreprecio_transporte:0,proveedor_origen:nLote.proveedor||null,nota:nLote.nota||null};
    const res=await sbPost("lotes_almacen",data);
    if(res&&res[0]){
      setLotes([...lotes,res[0]]);
      // Update local inventory (trigger in DB does it too)
      const costoTotal=nLote.costo_unitario+(nLote.iva||0);
      setInventario(inventario.map(p=>p.id===nLote.inv_id?{...p,existencia:p.existencia+nLote.cantidad,costo_unitario_actual:costoTotal}:p));
      setNLote({inv_id:"",cantidad:0,costo_unitario:0,iva:0,proveedor:"",nota:""});
      alert("Lote registrado — inventario actualizado");
    }else{alert("Error al registrar lote");}
    setSavingLote(false);
  };

  // Change #5: Print pedido surtido
  const handlePrint=(pedId)=>{
    const ped=allPedidos?.find(p=>p.id===pedId)||pedidosAlm.find(p=>p.id===pedId);
    const items=pedidoDetalle.filter(d=>d.pedido_id===pedId&&proveedores.find(pr=>pr.id===d.proveedor_id)?.tipo_flujo==="Almacen interno");
    const rows=items.map(d=>{const cat=catalogo.find(c=>c.id===d.catalogo_id)||{};return`<tr><td style="padding:6px;border-bottom:1px solid #eee">${cat.articulo||"?"}</td><td style="padding:6px;border-bottom:1px solid #eee;text-align:center">${d.cantidad} ${cat.unidad_clave||""}</td></tr>`;}).join("");
    const w=window.open("","_blank","width=400,height=600");
    w.document.write(`<html><head><title>Pedido ${ped?.numero_pedido||""}</title><style>body{font-family:sans-serif;padding:20px}table{width:100%;border-collapse:collapse}th{text-align:left;padding:6px;border-bottom:2px solid #333;font-size:12px;text-transform:uppercase}td{font-size:13px}@media print{button{display:none}}</style></head><body><div style="text-align:center;margin-bottom:16px"><strong style="font-size:18px">Fit Taste</strong><br><span style="font-size:12px;color:#888">Pedido ${ped?.numero_pedido||""} — ${new Date().toLocaleDateString("es-MX")}</span></div><table><thead><tr><th>Artículo</th><th style="text-align:center">Cantidad</th></tr></thead><tbody>${rows}</tbody></table><br><button onclick="window.print()" style="padding:8px 16px;background:#e2a52a;border:none;border-radius:8px;font-weight:bold;cursor:pointer">Imprimir</button></body></html>`);
    w.document.close();
  };

  // Change #6: Add product to almacén (admin only)
  const handleAddInv=async()=>{
    if(!newInv.descripcion){alert("Completa la descripción");return;}
    setSavingInv(true);
    const unid=await sbGet("unidades_medida",`clave=eq.${newInv.unidad_clave}&limit=1`);
    const uid=unid[0]?.id||null;
    const res=await sbPost("inventario_almacen",{sku:newInv.sku,descripcion:newInv.descripcion.toUpperCase().trim(),unidad_id:uid,existencia:0,costo_unitario_actual:0});
    if(res&&res[0]){
      setInventario([...inventario,{id:res[0].id,sku:newInv.sku,descripcion:newInv.descripcion.toUpperCase().trim(),unidad_clave:newInv.unidad_clave,existencia:0,costo_unitario_actual:0}]);
      setNewInv({sku:"",descripcion:"",unidad_clave:"kg"});
      setAddingInv(false);
      alert("Producto agregado al almacén con existencia 0");
    }else{alert("Error — verifica que el SKU no esté duplicado");}
    setSavingInv(false);
  };

  // Change #7: Delete product from almacén (admin only)
  const handleDeleteInv=async(invId)=>{
    const prod=inventario.find(p=>p.id===invId);
    if(!confirm(`¿Eliminar "${prod?.descripcion}" del almacén?\n\nEsto borrará todos sus lotes y movimientos. Los productos del catálogo vinculados se desvincularán.`))return;
    await sbDeleteWhere("lotes_almacen",`inventario_id=eq.${invId}`);
    await sbDelete("inventario_almacen",invId);
    setInventario(inventario.filter(p=>p.id!==invId));
    setLotes(lotes.filter(l=>l.inventario_id!==invId));
    alert(`${prod?.descripcion} eliminado del almacén`);
  };

  // Pedidos ya surtidos (for print)
  const pedidosSurtidos=(allPedidos||[]).filter(p=>(allProvEstatus||[]).some(pe=>pe.pedido_id===p.id&&pe.estatus==="surtido"&&proveedores.find(pr=>pr.id===pe.proveedor_id)?.tipo_flujo==="Almacen interno"));

  // Group lotes by product
  const lotesByProd={};
  lotes.filter(l=>(l.existencia_restante||l.cantidad)>0).forEach(l=>{
    const prod=inventario.find(p=>p.id===l.inventario_id);
    const k=prod?.descripcion||l.inventario_id;
    if(!lotesByProd[k])lotesByProd[k]={prod,lotes:[]};
    lotesByProd[k].lotes.push(l);
  });
  // Sort lotes by date (oldest first = PEPS)
  Object.values(lotesByProd).forEach(g=>g.lotes.sort((a,b)=>new Date(a.fecha_entrada)-new Date(b.fecha_entrada)));

  const tabs2=[{id:"inventario",l:"Inventario"},{id:"lotes",l:"Lotes PEPS"},{id:"entrada",l:"+ Entrada"},{id:"surtir",l:`Surtir (${pedidosAlm.length})`}];

  return(<div>
    <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
      <div><h2 className="text-lg font-bold text-gray-900">Almacén — Control PEPS</h2><p className="text-sm text-gray-500">Primeras Entradas, Primeras Salidas</p></div>
      <div className="bg-teal-50 border border-teal-200 rounded-xl px-4 py-2 text-right"><p className="text-xs text-teal-600">Capital</p><p className="text-xl font-bold text-teal-700">{fmt(cap)}</p></div>
    </div>

    <div className="flex gap-1 mb-4">{tabs2.map(t=><button key={t.id} onClick={()=>{setTab(t.id);if(t.id!=="surtir")setSurtiendo(null);}} className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all ${tab===t.id?"text-white":"text-gray-500 hover:text-gray-700 bg-white border border-gray-200"}`} style={tab===t.id?{background:"#77b7b4"}:{}}>{t.l}</button>)}</div>

    {/* INVENTARIO con costos PEPS */}
    {tab==="inventario"&&<div>
      {isAdmin&&<div className="mb-3 flex justify-end">{addingInv?<div className="bg-white border-2 border-teal-300 rounded-xl p-3 w-full"><h3 className="text-sm font-bold text-teal-800 mb-2">Agregar producto al almacén</h3><div className="flex gap-2 items-end flex-wrap"><div><label className="text-xs text-gray-500 block mb-1">SKU <span className="text-teal-600">(auto)</span></label><input className="border border-gray-200 rounded-lg px-3 py-1.5 text-sm w-28 bg-gray-50 text-gray-600" value={newInv.sku} readOnly/></div><div className="flex-1"><label className="text-xs text-gray-500 block mb-1">Descripción</label><input className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm" placeholder="NOMBRE DEL PRODUCTO" value={newInv.descripcion} onChange={e=>setNewInv({...newInv,descripcion:e.target.value})}/></div><div><label className="text-xs text-gray-500 block mb-1">Unidad</label><select className="border border-gray-200 rounded-lg px-3 py-1.5 text-sm" value={newInv.unidad_clave} onChange={e=>setNewInv({...newInv,unidad_clave:e.target.value})}><option value="kg">kg</option><option value="pz">pz</option><option value="lt">lt</option><option value="paq">paq</option></select></div><Btn onClick={handleAddInv} disabled={savingInv} color="purple">{savingInv?"Guardando...":"Agregar"}</Btn><button onClick={()=>setAddingInv(false)} className="text-xs text-gray-500 hover:text-gray-700 px-2 py-1.5">Cancelar</button></div></div>:<Btn onClick={()=>{setNewInv({sku:genInvSku(),descripcion:"",unidad_clave:"kg"});setAddingInv(true);}} color="purple">+ Agregar producto</Btn>}</div>}
      <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
      <table className="w-full text-sm"><thead className="bg-gray-50"><tr>
        {["SKU","Producto","Existencia","Costo PEPS","Valor PEPS","Lotes","Estado"].concat(isAdmin?[""]:[]).map(h=><th key={h} className={`px-3 py-2.5 font-semibold text-gray-600 text-xs uppercase ${["Existencia","Costo PEPS","Valor PEPS","Lotes"].includes(h)?"text-right":"text-left"}`}>{h}</th>)}
      </tr></thead><tbody>{inventario.map(p=>{
        const prodLotes=lotes.filter(l=>l.inventario_id===p.id&&(l.existencia_restante||0)>0);
        const valorPeps=prodLotes.reduce((s,l)=>(l.existencia_restante||0)*(parseFloat(l.costo_unitario)+parseFloat(l.iva||0))+s,0);
        const costoPeps=p.existencia>0&&prodLotes.length>0?valorPeps/prodLotes.reduce((s,l)=>s+(l.existencia_restante||0),0):p.costo_unitario_actual;
        const low=(p.unidad_clave==="kg"&&p.existencia<2)||(p.unidad_clave!=="kg"&&p.existencia<50);
        return(<tr key={p.id} className={`border-t border-gray-100 ${low?"bg-red-50/50":"hover:bg-gray-50"}`}>
          <td className="px-3 py-2 text-gray-400 font-mono text-xs">{p.sku}</td>
          <td className="px-3 py-2 font-medium text-gray-900">{p.descripcion}</td>
          <td className="px-3 py-2 text-right font-bold">{fmtQ(p.existencia,p.unidad_clave)}</td>
          <td className="px-3 py-2 text-right text-gray-600">{fmt(costoPeps)}<span className="text-gray-400 text-xs">/{p.unidad_clave}</span></td>
          <td className="px-3 py-2 text-right font-medium text-gray-700">{fmt(valorPeps||p.existencia*p.costo_unitario_actual)}</td>
          <td className="px-3 py-2 text-right"><span className={`text-xs font-medium ${prodLotes.length>0?"text-teal-600":"text-gray-400"}`}>{prodLotes.length}</span></td>
          <td className="px-3 py-2">{p.existencia===0?<Badge v="danger">Agotado</Badge>:low?<Badge v="warning">Bajo</Badge>:<Badge v="success">OK</Badge>}</td>
          {isAdmin&&<td className="px-3 py-2 text-right"><button onClick={()=>handleDeleteInv(p.id)} className="text-xs text-red-400 hover:text-red-600 hover:bg-red-50 px-2 py-1 rounded" title="Eliminar producto">✕</button></td>}
        </tr>);
      })}</tbody></table>
    </div></div>}

    {/* LOTES PEPS */}
    {tab==="lotes"&&<div>
      {Object.entries(lotesByProd).length===0?<div className="bg-white border border-gray-200 rounded-xl p-8 text-center"><p className="text-gray-400">Sin lotes activos</p><Btn onClick={()=>setTab("entrada")}>Registrar primera entrada</Btn></div>
      :Object.entries(lotesByProd).map(([nombre,{prod,lotes:pLotes}])=>(
        <div key={nombre} className="bg-white border border-gray-200 rounded-xl mb-3 overflow-hidden">
          <div className="px-4 py-2 bg-teal-50 border-b border-teal-100 flex justify-between items-center">
            <span className="font-semibold text-teal-900">{nombre} <span className="text-xs text-teal-600">({prod?.unidad_clave})</span></span>
            <span className="text-sm font-bold text-teal-700">{pLotes.length} lote{pLotes.length>1?"s":""}</span>
          </div>
          <table className="w-full text-xs"><thead><tr className="border-b border-gray-100">
            {["Fecha","Original","Restante","Costo unit.","IVA","Costo total/u","Valor restante","Proveedor"].map(h=><th key={h} className={`px-3 py-1.5 font-medium text-gray-500 ${h==="Fecha"||h==="Proveedor"?"text-left":"text-right"}`}>{h}</th>)}
          </tr></thead><tbody>{pLotes.map((l,i)=>{
            const rest=l.existencia_restante||0;
            const cu=parseFloat(l.costo_unitario)||0;
            const iv=parseFloat(l.iva)||0;
            const ct=cu+iv;
            return(<tr key={l.id} className={`border-t border-gray-50 ${i===0?"bg-teal-50/30":""}`}>
              <td className="px-3 py-1.5 text-gray-600">{new Date(l.fecha_entrada).toLocaleDateString("es-MX")}{i===0&&<span className="ml-1 text-teal-600 font-semibold">← PEPS</span>}</td>
              <td className="px-3 py-1.5 text-right text-gray-400">{fmtQ(l.cantidad,prod?.unidad_clave||"?")}</td>
              <td className="px-3 py-1.5 text-right font-bold text-gray-800">{fmtQ(rest,prod?.unidad_clave||"?")}</td>
              <td className="px-3 py-1.5 text-right">{fmt(cu)}</td>
              <td className="px-3 py-1.5 text-right">{fmt(iv)}</td>
              <td className="px-3 py-1.5 text-right font-semibold text-teal-700">{fmt(ct)}</td>
              <td className="px-3 py-1.5 text-right">{fmt(rest*ct)}</td>
              <td className="px-3 py-1.5 text-gray-500">{l.proveedor_origen||"-"}</td>
            </tr>);})}</tbody></table>
        </div>
      ))}
    </div>}

    {/* ENTRADA DE LOTE */}
    {tab==="entrada"&&<div className="bg-white border-2 border-teal-300 rounded-xl p-4">
      <h3 className="text-sm font-bold text-teal-800 mb-3">Registrar entrada de lote</h3>
      <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-3">
        <div><label className="text-xs text-gray-500 block mb-1">Producto</label><select className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm" value={nLote.inv_id} onChange={e=>setNLote({...nLote,inv_id:e.target.value})}><option value="">Seleccionar...</option>{inventario.map(p=><option key={p.id} value={p.id}>{p.descripcion} ({p.unidad_clave})</option>)}</select></div>
        <div><label className="text-xs text-gray-500 block mb-1">Cantidad</label><input type="number" min="0" step="0.25" className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm" value={nLote.cantidad||""} onChange={e=>setNLote({...nLote,cantidad:parseFloat(e.target.value)||0})}/></div>
        <div><label className="text-xs text-gray-500 block mb-1">Costo unitario (sin IVA)</label><input type="number" min="0" step="0.01" className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm" value={nLote.costo_unitario||""} onChange={e=>setNLote({...nLote,costo_unitario:parseFloat(e.target.value)||0})}/></div>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
        <div><label className="text-xs text-gray-500 block mb-1">IVA por unidad</label><input type="number" min="0" step="0.01" className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm" placeholder="0 si exento" value={nLote.iva||""} onChange={e=>setNLote({...nLote,iva:parseFloat(e.target.value)||0})}/></div>
        <div><label className="text-xs text-gray-500 block mb-1">Proveedor origen</label><input className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm" placeholder="Nombre del proveedor" value={nLote.proveedor} onChange={e=>setNLote({...nLote,proveedor:e.target.value})}/></div>
        <div><label className="text-xs text-gray-500 block mb-1">Nota</label><input className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm" placeholder="Opcional" value={nLote.nota} onChange={e=>setNLote({...nLote,nota:e.target.value})}/></div>
      </div>
      {nLote.costo_unitario>0&&nLote.cantidad>0&&<div className="bg-teal-50 rounded-xl p-3 mb-4">
        <div className="grid grid-cols-4 gap-3 text-sm">
          <div><p className="text-xs text-teal-600">Costo/u</p><p className="font-bold text-teal-800">{fmt(nLote.costo_unitario)}</p></div>
          <div><p className="text-xs text-teal-600">IVA/u</p><p className="font-bold text-teal-800">{fmt(nLote.iva||0)}</p></div>
          <div><p className="text-xs text-teal-600">Total/u</p><p className="font-bold text-teal-900">{fmt(nLote.costo_unitario+(nLote.iva||0))}</p></div>
          <div><p className="text-xs text-teal-600">Total lote</p><p className="font-bold text-teal-900">{fmt(nLote.cantidad*(nLote.costo_unitario+(nLote.iva||0)))}</p></div>
        </div>
      </div>}
      <Btn onClick={handleNewLote} disabled={savingLote||!nLote.inv_id||nLote.cantidad<=0||nLote.costo_unitario<=0} color="purple">{savingLote?"Guardando...":"Registrar lote de entrada"}</Btn>
    </div>}

    {/* SURTIR PEDIDOS */}
    {tab==="surtir"&&!surtiendo&&<div>
      {pedidosAlm.length===0?<div className="bg-white border border-gray-200 rounded-xl p-8 text-center"><p className="text-gray-400">Sin pedidos pendientes de surtir</p></div>
      :<div className="rounded-xl p-4 border-2 border-amber-300 bg-amber-50"><h3 className="text-sm font-bold text-amber-800 mb-3">Pedidos pendientes de surtir</h3>
        {pedidosAlm.map((p,i)=>{const items=pedidoDetalle.filter(d=>d.pedido_id===p.id&&proveedores.find(pr=>pr.id===d.proveedor_id)?.tipo_flujo==="Almacen interno");const tot=items.reduce((s,d)=>s+d.cantidad*d.costo_referencia,0);return(<div key={i} className="bg-white rounded-xl p-3 mb-2 border border-amber-200"><div className="flex justify-between items-center mb-2"><div><span className="font-bold text-gray-900">Pedido #{p.numero_pedido}</span><span className="text-xs text-gray-500 ml-2">{new Date(p.fecha||p.created_at).toLocaleDateString("es-MX")}</span></div><div className="flex items-center gap-2"><span className="text-sm font-semibold text-gray-700">{fmt(tot)}</span><Btn onClick={()=>{setSurtiendo(p.id);setSurtidos({});const c={};items.forEach(d=>{c[d.id]=d.cantidad;});setCantSurtida(c);}} color="purple">Ver y surtir</Btn></div></div><div className="text-xs text-gray-600">{items.map(d=>{const cat=catalogo.find(c=>c.id===d.catalogo_id)||{};return<span key={d.id} className="inline-block bg-gray-100 rounded px-2 py-0.5 mr-1 mb-1">{cat.articulo} ({cat.unidad_clave==="kg"?fmtQ(d.cantidad,"kg"):d.cantidad+" "+cat.unidad_clave})</span>})}</div></div>);})}
      </div>}
      {/* Pedidos ya surtidos — con botón imprimir */}
      {pedidosSurtidos.length>0&&<div className="rounded-xl p-4 border border-emerald-200 bg-emerald-50 mt-4"><h3 className="text-sm font-bold text-emerald-800 mb-3">Pedidos surtidos</h3>
        {pedidosSurtidos.map((p,i)=>{const items=pedidoDetalle.filter(d=>d.pedido_id===p.id&&proveedores.find(pr=>pr.id===d.proveedor_id)?.tipo_flujo==="Almacen interno");return(<div key={i} className="bg-white rounded-xl p-3 mb-2 border border-emerald-200 flex justify-between items-center"><div><span className="font-bold text-gray-900">Pedido {p.numero_pedido||"#"+p.id}</span><span className="text-xs text-gray-500 ml-2">{new Date(p.fecha||p.created_at).toLocaleDateString("es-MX")}</span><span className="text-xs text-emerald-600 ml-2">{items.length} artículos</span></div><button onClick={()=>handlePrint(p.id)} className="text-sm font-medium bg-white border border-emerald-300 text-emerald-700 hover:bg-emerald-100 px-3 py-1.5 rounded-lg">🖨 Imprimir</button></div>);})}
      </div>}
    </div>}

    {tab==="surtir"&&surtiendo&&<div className="rounded-xl mb-4 border-2 border-teal-300 bg-teal-50 overflow-hidden">
      <div className="px-4 py-3 bg-teal-100 border-b border-teal-200 flex items-center justify-between"><div><h3 className="font-bold text-teal-900">Surtiendo Pedido #{pedidosAlm.find(p=>p.id===surtiendo)?.numero_pedido}</h3><p className="text-xs text-teal-700">{totalSurtidos} de {pedidoItems.length} marcados</p></div><button onClick={()=>setSurtiendo(null)} className="text-xs text-teal-700 hover:text-teal-900 px-3 py-1.5 border border-teal-300 rounded-lg">← Volver</button></div>
      <div className="w-full bg-teal-200 h-2"><div className="bg-teal-600 h-2 transition-all" style={{width:`${pedidoItems.length>0?(totalSurtidos/pedidoItems.length*100):0}%`}}/></div>
      <div className="p-4">
        <p className="text-xs text-teal-700 mb-3">Ajusta cantidad surtida. Al confirmar, se descontará por PEPS (lote más antiguo primero).</p>
        {pedidoItems.map(d=>{
          const cat=catalogo.find(c=>c.id===d.catalogo_id)||{};
          const done=surtidos[d.id];
          const cs=cantSurtida[d.id]||0;
          const parcial=cs<d.cantidad&&cs>0;
          // Buscar inventario y lotes para este producto
          const inv=cat.inv_id?inventario.find(i=>i.id===cat.inv_id):inventario.find(i=>{const dL=i.descripcion.toLowerCase();const words=cat.articulo.toLowerCase().split(" ");return words.some(w=>w.length>3&&dL.includes(w));});
          const existencia=inv?inv.existencia:0;
          const prodLotes=inv?lotes.filter(l=>l.inventario_id===inv.id&&(l.existencia_restante||0)>0).sort((a,b)=>new Date(a.fecha_entrada)-new Date(b.fecha_entrada)):[];
          const alcanza=existencia>=cs;
          return(<div key={d.id} className={`p-3 mb-2 rounded-xl border-2 transition-all ${done?"border-emerald-400 bg-emerald-50":"border-gray-200 bg-white"}`}>
            <div className="flex items-center gap-3">
              <div onClick={()=>setSurtidos({...surtidos,[d.id]:!surtidos[d.id]})} className={`w-7 h-7 rounded-lg border-2 flex items-center justify-center text-sm cursor-pointer shrink-0 ${done?"border-emerald-500 bg-emerald-500 text-white":"border-gray-300 hover:border-teal-400"}`}>{done?"✓":""}</div>
              <div className="flex-1">
                <p className={`font-medium ${done?"text-emerald-800":"text-gray-900"}`}>{cat.articulo}</p>
                <p className="text-xs text-gray-500">Solicitado: {cat.unidad_clave==="kg"?fmtQ(d.cantidad,"kg"):`${d.cantidad} ${cat.unidad_clave}`}</p>
              </div>
              <div className="flex items-center gap-2">
                {parcial&&<Badge v="warning">Parcial</Badge>}
                <div><label className="text-xs text-gray-500 block">Surtido</label><input type="number" min="0" step={cat.unidad_clave==="kg"?"0.25":"1"} className={`w-20 text-center border rounded-lg px-1 py-1 text-sm ${cs>existencia?"border-red-400 bg-red-50":cs<d.cantidad?"border-orange-300 bg-orange-50":"border-gray-200"}`} value={cantSurtida[d.id]||""} onChange={e=>setCantSurtida({...cantSurtida,[d.id]:parseFloat(e.target.value)||0})}/></div>
                <span className="text-xs text-gray-400">{cat.unidad_clave}</span>
              </div>
            </div>
            {/* Existencia y lotes */}
            <div className="ml-10 mt-2 flex items-center gap-4">
              <div className={`text-xs px-2 py-1 rounded-lg ${alcanza?"bg-emerald-100 text-emerald-800":"bg-red-100 text-red-800"}`}>
                Existencia: <span className="font-bold">{inv?fmtQ(existencia,cat.unidad_clave):"No vinculado"}</span>
                {cs>0&&existencia>0&&<span className="ml-1">→ quedarían {fmtQ(Math.max(0,existencia-cs),cat.unidad_clave)}</span>}
              </div>
              {prodLotes.length>0&&<div className="text-xs text-teal-600">
                {prodLotes.length} lote{prodLotes.length>1?"s":""}: {prodLotes.map((l,i)=>{const rest=l.existencia_restante||0;const cu=parseFloat(l.costo_unitario)+(parseFloat(l.iva)||0);return<span key={l.id} className={`inline-block mr-1 ${i===0?"font-bold":""}`}>{fmtQ(rest,cat.unidad_clave)} @{fmt(cu)}{i<prodLotes.length-1?",":""}</span>;})}
              </div>}
              {!inv&&<span className="text-xs text-red-600 font-medium">No vinculado a inventario</span>}
            </div>
          </div>);
        })}
        <div className="flex justify-end mt-4"><Btn onClick={()=>{onSurtirPedido(surtiendo,cantSurtida);setSurtiendo(null);setSurtidos({});}} disabled={!allSurtidos} color="purple">{allSurtidos?"Pedido Surtido (PEPS) ✓":`Marca los ${pedidoItems.length-totalSurtidos} restantes`}</Btn></div>
      </div>
    </div>}

    {/* MOVIMIENTOS RECIENTES */}
    {movimientos.length>0&&<div className="mt-4"><h3 className="text-sm font-bold text-gray-700 mb-2">Movimientos recientes</h3><div className="space-y-1">{movimientos.slice().reverse().slice(0,8).map(m=>{const prod=inventario.find(p=>p.id===m.inv_id);return(<div key={m.id} className="flex items-center gap-2 text-sm bg-white border border-gray-100 rounded-lg px-3 py-2"><Badge v={m.tipo==="entrada"?"success":"danger"}>{m.tipo}</Badge><span className="font-medium text-gray-800">{prod?.descripcion}</span><span className="text-gray-500">{fmtQ(m.qty,prod?.unidad_clave||"pz")}</span>{m.nota&&<span className="text-gray-400 text-xs">— {m.nota}</span>}<span className="ml-auto text-xs text-gray-400">{m.fecha}</span></div>);})}</div></div>}
  </div>);
}

// ======================== DASHBOARD FINANCIERO ========================
function DashboardView({pedidos,catalogo,proveedores,pedidoDetalle,inventario}){
  const [mesOffset,setMesOffset]=useState(0);
  const now=new Date();
  const mesActual=new Date(now.getFullYear(),now.getMonth()-mesOffset,1);
  const mesNombre=mesActual.toLocaleDateString("es-MX",{month:"long",year:"numeric"});
  const mesInicio=mesActual.toISOString().split("T")[0];
  const mesFin=new Date(mesActual.getFullYear(),mesActual.getMonth()+1,0).toISOString().split("T")[0];

  // Pedidos del mes
  const pedidosMes=pedidos.filter(p=>{const f=p.fecha||p.created_at?.split("T")[0];return f>=mesInicio&&f<=mesFin;});
  const pedidosCerradosMes=pedidosMes.filter(p=>p.estatus==="cerrado");
  const pedidosActivosMes=pedidosMes.filter(p=>p.estatus!=="cerrado");

  // Detalle del mes
  const pedidoIdsMes=new Set(pedidosMes.map(p=>p.id));
  const detalleMes=pedidoDetalle.filter(d=>pedidoIdsMes.has(d.pedido_id));

  // Costo real del mes
  const costoRealMes=detalleMes.reduce((s,d)=>s+d.cantidad*(d.costo_real||0),0);
  const costoTeoricoMes=detalleMes.reduce((s,d)=>s+d.cantidad*d.costo_referencia,0);
  const desvMes=costoTeoricoMes>0?((costoRealMes-costoTeoricoMes)/costoTeoricoMes*100):0;

  // Por proveedor
  const byProv={};
  detalleMes.forEach(d=>{
    const prov=proveedores.find(p=>p.id===d.proveedor_id);
    const k=prov?.nombre||"Otro";
    if(!byProv[k])byProv[k]={total_real:0,total_teo:0,items:0};
    byProv[k].total_real+=d.cantidad*(d.costo_real||d.costo_referencia);
    byProv[k].total_teo+=d.cantidad*d.costo_referencia;
    byProv[k].items++;
  });
  const provSorted=Object.entries(byProv).sort((a,b)=>b[1].total_real-a[1].total_real);
  const maxProv=provSorted.length>0?provSorted[0][1].total_real:1;

  // Por SKU (top 15 por gasto)
  const bySku={};
  detalleMes.forEach(d=>{
    const cat=catalogo.find(c=>c.id===d.catalogo_id);
    if(!cat)return;
    const k=cat.articulo;
    if(!bySku[k])bySku[k]={total_real:0,total_teo:0,cantidad:0,unidad:cat.unidad_clave,sku:cat.sku,proveedor:cat.proveedor_nombre};
    bySku[k].total_real+=d.cantidad*(d.costo_real||d.costo_referencia);
    bySku[k].total_teo+=d.cantidad*d.costo_referencia;
    bySku[k].cantidad+=d.cantidad;
  });
  const skuSorted=Object.entries(bySku).sort((a,b)=>b[1].total_real-a[1].total_real);
  const maxSku=skuSorted.length>0?skuSorted[0][1].total_real:1;

  // Capital almacén
  const capAlmacen=inventario.reduce((s,p)=>s+p.existencia*p.costo_unitario_actual,0);

  return(<div>
    <div className="flex items-center justify-between mb-6">
      <div className="flex items-center gap-3"><Logo size={40}/><div><h2 className="text-lg font-bold text-gray-900">Dashboard financiero</h2><p className="text-sm text-gray-500">Fit Taste Roma — v{V}</p></div></div>
      <div className="flex items-center gap-2">
        <button onClick={()=>setMesOffset(mesOffset+1)} className="px-3 py-1.5 rounded-lg text-sm border border-gray-200 hover:bg-gray-100">←</button>
        <span className="text-sm font-semibold text-gray-800 capitalize min-w-32 text-center">{mesNombre}</span>
        <button onClick={()=>setMesOffset(Math.max(0,mesOffset-1))} disabled={mesOffset===0} className="px-3 py-1.5 rounded-lg text-sm border border-gray-200 hover:bg-gray-100 disabled:opacity-30">→</button>
      </div>
    </div>

    {/* KPIs principales */}
    <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
      <div className="bg-white border border-gray-200 rounded-xl p-3"><p className="text-xs text-gray-500">Costo real del mes</p><p className="text-xl font-bold text-gray-900">{fmt(costoRealMes)}</p></div>
      <div className="bg-white border border-gray-200 rounded-xl p-3"><p className="text-xs text-gray-500">Costo teórico</p><p className="text-xl font-bold text-gray-500">{fmt(costoTeoricoMes)}</p></div>
      <div className="bg-white border border-gray-200 rounded-xl p-3"><p className="text-xs text-gray-500">Desviación</p><p className={`text-xl font-bold ${desvMes>5?"text-red-600":desvMes<-5?"text-emerald-600":"text-gray-800"}`}>{desvMes>0?"+":""}{desvMes.toFixed(1)}%</p></div>
      <div className="bg-white border border-gray-200 rounded-xl p-3"><p className="text-xs text-gray-500">Pedidos mes</p><p className="text-xl font-bold text-amber-600">{pedidosMes.length}<span className="text-xs text-gray-400 ml-1">({pedidosCerradosMes.length} cerrados)</span></p></div>
      <div className="bg-white border border-gray-200 rounded-xl p-3"><p className="text-xs text-gray-500">Capital almacén</p><p className="text-xl font-bold text-teal-600">{fmt(capAlmacen)}</p></div>
    </div>

    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      {/* GASTO POR PROVEEDOR */}
      <div className="bg-white border border-gray-200 rounded-xl p-4">
        <h3 className="text-sm font-bold text-gray-700 mb-3">Gasto por proveedor — <span className="capitalize">{mesNombre}</span></h3>
        {provSorted.length===0?<p className="text-sm text-gray-400">Sin datos para este mes</p>:provSorted.map(([prov,data])=>{
          const pct=maxProv>0?(data.total_real/maxProv)*100:0;
          const desv=data.total_teo>0?((data.total_real-data.total_teo)/data.total_teo*100):0;
          return(<div key={prov} className="mb-3">
            <div className="flex justify-between text-sm mb-1">
              <span className="text-gray-700 font-medium">{prov} <span className="text-gray-400 text-xs">({data.items} artículos)</span></span>
              <div className="flex items-center gap-2"><Badge v={Math.abs(desv)>10?"danger":Math.abs(desv)>5?"warning":"success"}>{desv>0?"+":""}{desv.toFixed(0)}%</Badge><span className="font-bold text-gray-800">{fmt(data.total_real)}</span></div>
            </div>
            <div className="w-full bg-gray-100 rounded-full h-3"><div className="h-3 rounded-full transition-all" style={{width:`${Math.min(pct,100)}%`,background:"#e2a52a"}}/></div>
          </div>);
        })}
        {provSorted.length>0&&<div className="border-t border-gray-100 pt-2 mt-2 flex justify-between font-bold text-sm"><span>Total</span><span>{fmt(costoRealMes)}</span></div>}
      </div>

      {/* CONSUMO POR SKU (top 15) */}
      <div className="bg-white border border-gray-200 rounded-xl p-4">
        <h3 className="text-sm font-bold text-gray-700 mb-3">Top consumo por SKU — <span className="capitalize">{mesNombre}</span></h3>
        {skuSorted.length===0?<p className="text-sm text-gray-400">Sin datos para este mes</p>:
        <div className="overflow-y-auto" style={{maxHeight:"400px"}}><table className="w-full text-sm"><thead className="sticky top-0 bg-white"><tr>
          {["Artículo","Cantidad","Costo real","% del total"].map(h=><th key={h} className={`px-2 py-1.5 font-medium text-gray-500 text-xs ${h==="Artículo"?"text-left":"text-right"}`}>{h}</th>)}
        </tr></thead><tbody>{skuSorted.slice(0,15).map(([art,data],i)=>{
          const pctTotal=costoRealMes>0?(data.total_real/costoRealMes*100):0;
          const desv=data.total_teo>0?((data.total_real-data.total_teo)/data.total_teo*100):0;
          return(<tr key={i} className="border-t border-gray-50">
            <td className="px-2 py-1.5"><p className="font-medium text-gray-800">{art}</p><p className="text-xs text-gray-400">{data.proveedor}</p></td>
            <td className="px-2 py-1.5 text-right text-gray-600">{data.unidad==="kg"?fmtQ(data.cantidad,"kg"):`${data.cantidad} ${data.unidad}`}</td>
            <td className="px-2 py-1.5 text-right"><span className="font-semibold">{fmt(data.total_real)}</span>{Math.abs(desv)>5&&<span className={`text-xs ml-1 ${desv>0?"text-red-500":"text-emerald-500"}`}>{desv>0?"+":""}{desv.toFixed(0)}%</span>}</td>
            <td className="px-2 py-1.5 text-right">
              <div className="flex items-center justify-end gap-1"><div className="w-12 bg-gray-100 rounded-full h-1.5"><div className="h-1.5 rounded-full" style={{width:`${Math.min(pctTotal,100)}%`,background:"#e2a52a"}}/></div><span className="text-xs text-gray-500 w-8">{pctTotal.toFixed(0)}%</span></div>
            </td>
          </tr>);})}</tbody></table></div>}
      </div>
    </div>

    {/* PEDIDOS ACTIVOS */}
    {pedidosActivosMes.length>0&&<div className="bg-white border border-gray-200 rounded-xl p-4">
      <h3 className="text-sm font-bold text-gray-700 mb-3">Pedidos activos</h3>
      {pedidosActivosMes.map(p=>{
        const det=pedidoDetalle.filter(d=>d.pedido_id===p.id);
        const real=det.reduce((s,d)=>s+d.cantidad*(d.costo_real||d.costo_referencia),0);
        const sinPrecio=det.filter(d=>!d.costo_real).length;
        return(<div key={p.id} className="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
          <div className="flex items-center gap-2"><span className="font-medium text-gray-800">#{p.numero_pedido}</span>{estatusBadge(p.estatus)}{sinPrecio>0&&<span className="text-xs text-amber-600">{sinPrecio} sin precio</span>}</div>
          <span className="font-semibold text-gray-700">{fmt(real)}</span>
        </div>);
      })}
    </div>}
  </div>);
}

// ======================== CATÁLOGO (solo Admin) ========================
function CatalogoView({catalogo,setCatalogo,proveedores,unidades,inventario}){
  const [filter,setFilter]=useState("");
  const [filterProv,setFilterProv]=useState("");
  const [editing,setEditing]=useState(null);
  const [editData,setEditData]=useState({});
  const [adding,setAdding]=useState(false);
  const [newItem,setNewItem]=useState({sku:"",articulo:"",tipo_producto:"VERDURA",unidad_clave:"kg",costo_referencia:0,proveedor_id:"",notas:""});
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState(null);

  // Auto-serial SKU por tipo
  const prefixMap={PROTEINAS:"PRO",SUPLEMENTO:"SUP",EMPAQUE:"EMP",VERDURA:"VER",FRUTA:"FRU",LIMPIEZA:"LIM",ABARROTES:"ABA",COCINA:"COC",OTRO:"OTR"};
  const genCatSku=(tipo)=>{
    const prefix=prefixMap[tipo]||tipo.substring(0,3).toUpperCase();
    const existing=catalogo.filter(c=>c.sku.startsWith(prefix+"-")).map(c=>parseInt(c.sku.split("-")[1])||0);
    const next=existing.length>0?Math.max(...existing)+1:1;
    return`${prefix}-${String(next).padStart(3,"0")}`;
  };

  // Delete product (soft delete)
  const handleDelete=async(p)=>{
    if(!confirm(`¿Eliminar "${p.articulo}" del catálogo?`))return;
    setSaving(true);
    await sbPatch("catalogo",p.id,{activo:false});
    setCatalogo(catalogo.filter(c=>c.id!==p.id));
    setMsg(`${p.articulo} eliminado`);
    setSaving(false);
    setTimeout(()=>setMsg(null),3000);
  };

  const filtered=catalogo.filter(p=>{const textMatch=p.articulo.toLowerCase().includes(filter.toLowerCase())||p.sku.toLowerCase().includes(filter.toLowerCase())||p.tipo_producto.toLowerCase().includes(filter.toLowerCase())||p.proveedor_nombre.toLowerCase().includes(filter.toLowerCase());const provMatch=!filterProv||p.proveedor_id===filterProv;return textMatch&&provMatch;});
  const tipos=[...new Set(catalogo.map(c=>c.tipo_producto))].sort();

  const startEdit=(p)=>{setEditing(p.id);setEditData({articulo:p.articulo,costo_referencia:p.costo_referencia,proveedor_id:p.proveedor_id,unidad_clave:p.unidad_clave,notas:p.notas||"",aplica_iva:p.aplica_iva!==false,inv_id:p.inv_id||""});};

  const saveEdit=async(p)=>{
    setSaving(true);setMsg(null);
    const unid=unidades.find(u=>u.clave===editData.unidad_clave);
    const updates={articulo:editData.articulo.toUpperCase().trim(),costo_referencia:editData.costo_referencia,proveedor_id:editData.proveedor_id,notas:editData.notas||null,aplica_iva:editData.aplica_iva,inventario_almacen_id:editData.inv_id||null};
    if(unid)updates.unidad_id=unid.id;
    const res=await sbPatch("catalogo",p.id,updates);
    if(res){
      const prov=proveedores.find(pr=>pr.id===editData.proveedor_id);
      setCatalogo(catalogo.map(c=>c.id===p.id?{...c,articulo:editData.articulo.toUpperCase().trim(),costo_referencia:parseFloat(editData.costo_referencia),proveedor_id:editData.proveedor_id,proveedor_nombre:prov?.nombre||c.proveedor_nombre,unidad_clave:editData.unidad_clave,notas:editData.notas,aplica_iva:editData.aplica_iva,inv_id:editData.inv_id||null}:c));
      setMsg(`${editData.articulo.toUpperCase().trim()} actualizado`);
    }else{setMsg("Error al guardar");}
    setEditing(null);setSaving(false);
    setTimeout(()=>setMsg(null),3000);
  };

  const saveNew=async()=>{
    if(!newItem.sku||!newItem.articulo||!newItem.proveedor_id){setMsg("Completa SKU, artículo y proveedor");return;}
    setSaving(true);setMsg(null);
    const unid=unidades.find(u=>u.clave===newItem.unidad_clave);
    const data={sku:newItem.sku,articulo:newItem.articulo.toUpperCase(),tipo_producto:newItem.tipo_producto,unidad_id:unid?.id,costo_referencia:newItem.costo_referencia,proveedor_id:newItem.proveedor_id,notas:newItem.notas||null,activo:true};
    const res=await sbPost("catalogo",data);
    if(res&&res[0]){
      const prov=proveedores.find(pr=>pr.id===newItem.proveedor_id);
      setCatalogo([...catalogo,{id:res[0].id,sku:newItem.sku,articulo:newItem.articulo.toUpperCase(),tipo_producto:newItem.tipo_producto,unidad_clave:newItem.unidad_clave,costo_referencia:parseFloat(newItem.costo_referencia),proveedor_id:newItem.proveedor_id,proveedor_nombre:prov?.nombre||"?",notas:newItem.notas}]);
      setMsg(`${newItem.articulo} agregado`);
      setNewItem({sku:"",articulo:"",tipo_producto:"VERDURA",unidad_clave:"kg",costo_referencia:0,proveedor_id:"",notas:""});
      setAdding(false);
    }else{setMsg("Error al agregar — verifica que el SKU no esté duplicado");}
    setSaving(false);
    setTimeout(()=>setMsg(null),3000);
  };

  return(<div>
    <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
      <div><h2 className="text-lg font-bold text-gray-900">Catálogo de productos</h2><p className="text-sm text-gray-500">{catalogo.length} SKUs — edición directa a Supabase</p></div>
      <Btn onClick={()=>{if(!adding){setNewItem({sku:genCatSku("VERDURA"),articulo:"",tipo_producto:"VERDURA",unidad_clave:"kg",costo_referencia:0,proveedor_id:"",notas:""});}setAdding(!adding);}}>{adding?"Cancelar":"+ Nuevo SKU"}</Btn>
    </div>

    {msg&&<div className={`rounded-xl p-3 mb-4 text-sm font-medium ${msg.includes("Error")?"bg-red-50 text-red-800 border border-red-200":"bg-emerald-50 text-emerald-800 border border-emerald-200"}`}>{msg}</div>}

    {adding&&<div className="bg-white border-2 border-amber-300 rounded-xl p-4 mb-4">
      <h3 className="text-sm font-bold text-gray-700 mb-3">Agregar nuevo producto</h3>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
        <div><label className="text-xs text-gray-500 block mb-1">SKU <span className="text-amber-600">(auto)</span></label><input className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm bg-gray-50 text-gray-600" value={newItem.sku} readOnly/></div>
        <div><label className="text-xs text-gray-500 block mb-1">Artículo</label><input className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-amber-400" placeholder="NOMBRE DEL PRODUCTO" value={newItem.articulo} onChange={e=>setNewItem({...newItem,articulo:e.target.value})}/></div>
        <div><label className="text-xs text-gray-500 block mb-1">Tipo</label><select className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm" value={newItem.tipo_producto} onChange={e=>{const t=e.target.value;setNewItem({...newItem,tipo_producto:t,sku:genCatSku(t)});}}>{tipos.map(t=><option key={t} value={t}>{t}</option>)}<option value="OTRO">OTRO</option></select></div>
        <div><label className="text-xs text-gray-500 block mb-1">Unidad</label><select className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm" value={newItem.unidad_clave} onChange={e=>setNewItem({...newItem,unidad_clave:e.target.value})}>{unidades.map(u=><option key={u.clave} value={u.clave}>{u.nombre} ({u.clave})</option>)}</select></div>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div><label className="text-xs text-gray-500 block mb-1">Costo referencia</label><input type="number" step="0.01" className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-amber-400" value={newItem.costo_referencia||""} onChange={e=>setNewItem({...newItem,costo_referencia:parseFloat(e.target.value)||0})}/></div>
        <div><label className="text-xs text-gray-500 block mb-1">Proveedor</label><select className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm" value={newItem.proveedor_id} onChange={e=>setNewItem({...newItem,proveedor_id:e.target.value})}><option value="">Seleccionar...</option>{proveedores.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</select></div>
        <div><label className="text-xs text-gray-500 block mb-1">Notas</label><input className="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm" placeholder="Opcional" value={newItem.notas} onChange={e=>setNewItem({...newItem,notas:e.target.value})}/></div>
        <div className="flex items-end"><Btn onClick={saveNew} disabled={saving}>{saving?"Guardando...":"Guardar producto"}</Btn></div>
      </div>
    </div>}

    <div className="flex gap-2 mb-4">
      <input className="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-amber-400" placeholder="Buscar por SKU, artículo, tipo..." value={filter} onChange={e=>setFilter(e.target.value)}/>
      <select className="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white" value={filterProv} onChange={e=>setFilterProv(e.target.value)}>
        <option value="">Todos los proveedores</option>
        {proveedores.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
      </select>
    </div>

    <div className="overflow-x-auto rounded-xl border border-gray-200 bg-white">
      <table className="w-full text-sm"><thead className="bg-gray-50"><tr>
        {["SKU","Artículo","Tipo","Unidad","Costo ref","IVA","Proveedor","Almacén","Notas",""].map(h=><th key={h} className={`px-3 py-2.5 font-semibold text-gray-600 text-xs uppercase ${h==="Costo ref"?"text-right":h==="IVA"?"text-center":"text-left"}`}>{h}</th>)}
      </tr></thead><tbody>{filtered.map(p=>{
        const isEditing=editing===p.id;
        return(<tr key={p.id} className={`border-t border-gray-100 ${isEditing?"bg-amber-50":""}`}>
          <td className="px-3 py-2 font-mono text-xs text-gray-500">{p.sku}</td>
          <td className="px-3 py-2 font-medium text-gray-900">{isEditing?<input className="w-full border border-amber-300 rounded px-1 py-0.5 text-sm bg-amber-50 font-medium focus:ring-2 focus:ring-amber-400" value={editData.articulo} onChange={e=>setEditData({...editData,articulo:e.target.value})}/>:p.articulo}</td>
          <td className="px-3 py-2"><Badge v={({PROTEINAS:"danger",SUPLEMENTO:"purple",EMPAQUE:"info",FRUTA:"warning"})[p.tipo_producto]||"success"}>{p.tipo_producto}</Badge></td>
          <td className="px-3 py-2">{isEditing?<select className="border border-amber-300 rounded px-1 py-0.5 text-xs bg-amber-50" value={editData.unidad_clave} onChange={e=>setEditData({...editData,unidad_clave:e.target.value})}>{unidades.map(u=><option key={u.clave} value={u.clave}>{u.clave}</option>)}</select>:<span className="text-gray-600">{p.unidad_clave}</span>}</td>
          <td className="px-3 py-2 text-right">{isEditing?<input type="number" step="0.01" className="w-24 text-right border border-amber-300 rounded px-1 py-0.5 text-sm bg-amber-50 focus:ring-2 focus:ring-amber-400" value={editData.costo_referencia} onChange={e=>setEditData({...editData,costo_referencia:parseFloat(e.target.value)||0})}/>:<span className="font-semibold text-gray-800">{fmt(p.costo_referencia)}</span>}</td>
          <td className="px-3 py-2 text-center">{isEditing?<label className="flex items-center justify-center gap-1 cursor-pointer"><input type="checkbox" checked={editData.aplica_iva} onChange={e=>setEditData({...editData,aplica_iva:e.target.checked})} className="w-4 h-4 rounded border-amber-300 text-amber-500 focus:ring-amber-400"/><span className="text-xs">{editData.aplica_iva?"Sí":"No"}</span></label>:p.aplica_iva?<span className="text-xs text-gray-500">16%</span>:<span className="text-xs text-emerald-600 font-semibold">Exento</span>}</td>
          <td className="px-3 py-2">{isEditing?<select className="border border-amber-300 rounded px-1 py-0.5 text-xs bg-amber-50" value={editData.proveedor_id} onChange={e=>setEditData({...editData,proveedor_id:e.target.value})}>{proveedores.map(pr=><option key={pr.id} value={pr.id}>{pr.nombre}</option>)}</select>:<span className="text-gray-600 text-xs">{p.proveedor_nombre}</span>}</td>
          <td className="px-3 py-2">{isEditing?<select className="border border-amber-300 rounded px-1 py-0.5 text-xs bg-amber-50" value={editData.inv_id||""} onChange={e=>setEditData({...editData,inv_id:e.target.value||null})}><option value="">Sin vincular</option>{inventario.map(i=><option key={i.id} value={i.id}>{i.descripcion} ({i.unidad_clave})</option>)}</select>:p.inv_id?<span className="text-xs text-teal-600 font-medium">{inventario.find(i=>i.id===p.inv_id)?.descripcion||"Vinculado"}</span>:<span className="text-xs text-gray-400">—</span>}</td>
          <td className="px-3 py-2">{isEditing?<input className="w-full border border-amber-300 rounded px-1 py-0.5 text-xs bg-amber-50" value={editData.notas} onChange={e=>setEditData({...editData,notas:e.target.value})}/>:<span className="text-gray-400 text-xs">{p.notas||""}</span>}</td>
          <td className="px-3 py-2 text-right">{isEditing?<div className="flex gap-1"><button onClick={()=>saveEdit(p)} disabled={saving} className="text-xs bg-emerald-500 text-white px-2 py-1 rounded hover:bg-emerald-600">{saving?"...":"Guardar"}</button><button onClick={()=>setEditing(null)} className="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded hover:bg-gray-300">X</button></div>:<div className="flex gap-1"><button onClick={()=>startEdit(p)} className="text-xs text-amber-700 hover:text-amber-900 font-medium hover:bg-amber-100 px-2 py-1 rounded">Editar</button><button onClick={()=>handleDelete(p)} className="text-xs text-red-400 hover:text-red-600 hover:bg-red-50 px-2 py-1 rounded" title="Eliminar">✕</button></div>}</td>
        </tr>);})}</tbody></table>
    </div>
    <p className="text-xs text-gray-400 mt-2 text-right">Mostrando {filtered.length} de {catalogo.length} productos</p>
  </div>);
}

// ======================== RECEPCIÓN DE MERCANCÍA (Sucursal) ========================
function RecepcionView({pedidos,pedidoDetalle,proveedores,provEstatus,catalogo,recepciones,recepcionDetalle,onRecibir}){
  const [recibiendo,setRecibiendo]=useState(null); // {pedId, provId}
  const [cantRecibida,setCantRecibida]=useState({});
  const [notasRecep,setNotasRecep]=useState({});
  const [saving,setSaving]=useState(false);

  // Pedidos con proveedores pendientes de recepción
  const pendientes=[];
  pedidos.forEach(p=>{
    if(p.estatus==="cerrado")return;
    provEstatus.filter(pe=>pe.pedido_id===p.id).forEach(pe=>{
      if(!["precios_capturados","completo","surtido"].includes(pe.estatus))return;
      const yaRecibido=recepciones.some(r=>r.pedido_id===p.id&&r.proveedor_id===pe.proveedor_id);
      if(yaRecibido)return;
      const prov=proveedores.find(pr=>pr.id===pe.proveedor_id);
      const items=pedidoDetalle.filter(d=>d.pedido_id===p.id&&d.proveedor_id===pe.proveedor_id);
      if(items.length>0)pendientes.push({pedido:p,proveedor:prov,pe,items});
    });
  });

  // Recientes (ya recibidos)
  const recientes=recepciones.slice().sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,10);

  const startRecibir=(pedId,provId,items)=>{
    setRecibiendo({pedId,provId});
    const c={};const n={};
    items.forEach(d=>{c[d.id]=d.cantidad;n[d.id]="";});
    setCantRecibida(c);setNotasRecep(n);
  };

  const confirmarRecepcion=async()=>{
    if(!recibiendo||saving)return;
    setSaving(true);
    const{pedId,provId}=recibiendo;
    const items=pedidoDetalle.filter(d=>d.pedido_id===pedId&&d.proveedor_id===provId);
    const hayFaltante=items.some(d=>(cantRecibida[d.id]||0)!==d.cantidad);
    const estatus=hayFaltante?"con_faltantes":"completo";
    await onRecibir(pedId,provId,estatus,items.map(d=>({pedido_detalle_id:d.id,cantidad_esperada:d.cantidad,cantidad_recibida:cantRecibida[d.id]||0,tiene_discrepancia:(cantRecibida[d.id]||0)!==d.cantidad,nota:notasRecep[d.id]||null})));
    setRecibiendo(null);setSaving(false);
  };

  if(recibiendo){
    const{pedId,provId}=recibiendo;
    const ped=pedidos.find(p=>p.id===pedId);
    const prov=proveedores.find(p=>p.id===provId);
    const items=pedidoDetalle.filter(d=>d.pedido_id===pedId&&d.proveedor_id===provId);
    const hayFaltante=items.some(d=>(cantRecibida[d.id]||0)!==d.cantidad);
    const todoOk=items.every(d=>(cantRecibida[d.id]||0)===d.cantidad);
    return(<div>
      <button onClick={()=>setRecibiendo(null)} className="text-sm text-gray-500 hover:text-gray-700 mb-4">← Volver</button>
      <div className="flex items-center justify-between mb-4"><div><h2 className="text-lg font-bold text-gray-900">Recepción — {prov?.nombre}</h2><p className="text-sm text-gray-500">Pedido {ped?.numero_pedido} — Valida cantidades recibidas</p></div>
        {todoOk&&<Badge v="success">Todo coincide</Badge>}
